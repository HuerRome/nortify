<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="assets/isologo.jpg" type="image/jpg">
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <header>

      <!-- contenido -->
        <div class="site-header">
          <a href="#" class="site-logo" aria-label="Ir al inicio">
            <img src="assets/logo.png" alt="">

          </a>
        
          <button
            class="nav-toggle"
            type="button"
            aria-label="Abrir menú de navegación"
            aria-expanded="false"
            aria-controls="site-nav-menu"
          >
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
          </button>
        
          <nav class="site-nav" aria-label="Navegación principal">
            <ul class="site-nav__menu" id="site-nav-menu">
              <li class="site-nav__item">
                <a href="#sobre-nosotros" class="site-nav__link is-active">Sobre Nosotros</a>
              </li>
              <li class="site-nav__item">
                <a href="#planes" class="site-nav__link">Planes</a>
              </li>
              <li class="site-nav__item">

              </li>
            </ul>
          </nav>
        
          <div class="header-actions">
            <a href="#buscar" class="header-btn header-btn--search" aria-label="Buscar">
              <span>Ver Proyectos</span>
            </a>
        
            <a href="#cotizar" class="header-btn header-btn--cta"><i class="fa-brands fa-whatsapp"></i> Contactarse</a>
          </div>
        </div>
    </div>

  <main>
    <section>
      <div class="container">
        <!-- contenido -->
        <section class="hero">
          <div class="container hero__container">
            <div class="hero__content">
              <h1 class="hero__title">
                Descubrí, Creá y Potenciá Tu Marca Digital
              </h1>
              <p class="hero__subtitle">
                Impulsamos negocios con estrategias de marketing, contenido y desarrollo web que generan resultados reales.
              </p>
              <div class="hero__buttons">
                <a href="#planes" class="btn btn--primary">Ver Planes</a>
                <a href="#equipo" class="btn btn--secondary">Sumate al equipo</a>
              </div>
            </div>
            <div class="hero__image">
              <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80" alt="Estrategias de marketing digital" class="hero__img">

            </div>
          </div>

  <footer>
    <div class="container">
      <!-- contenido del footer -->
    </div>

  <script src="js/script.js"></script>
